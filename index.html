<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎵 My Music Player</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  /* ── EDIT YOUR TRACKS HERE ───────────────────────────────────────── */
  /* (also editable in the JS block below)                              */

  :root {
    --bg:       #0a0a0f;
    --surface:  #13131a;
    --card:     #1a1a24;
    --border:   #2a2a3a;
    --accent:   #c8f250;
    --accent2:  #7c6af7;
    --text:     #eeeef4;
    --muted:    #6b6b80;
    --radius:   14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto;
    overflow: hidden;
  }

  /* noise grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999;
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 28px 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
  }

  .track-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 6px;
  }

  .search-box {
    margin: 14px 16px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 9px 12px 9px 34px;
    outline: none;
    transition: border-color .2s;
  }

  .search-box input:focus { border-color: var(--accent2); }
  .search-box input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); font-size: 0.9rem;
  }

  .track-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 10px;
  }

  .track-list::-webkit-scrollbar { width: 4px; }
  .track-list::-webkit-scrollbar-track { background: transparent; }
  .track-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .track-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s;
    position: relative;
  }

  .track-item:hover { background: var(--card); }

  .track-item.active {
    background: var(--card);
  }

  .track-item.active .track-name {
    color: var(--accent);
  }

  .track-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    width: 18px;
    text-align: right;
    flex-shrink: 0;
  }

  .track-item.active .track-num { display: none; }

  .playing-bars {
    display: none;
    gap: 2px;
    align-items: flex-end;
    height: 14px;
    width: 18px;
    flex-shrink: 0;
  }

  .track-item.active .playing-bars { display: flex; }

  .bar {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: bounce 0.8s ease-in-out infinite alternate;
  }

  .bar:nth-child(1) { height: 6px;  animation-delay: 0s; }
  .bar:nth-child(2) { height: 12px; animation-delay: 0.15s; }
  .bar:nth-child(3) { height: 8px;  animation-delay: 0.3s; }

  @keyframes bounce {
    from { transform: scaleY(0.4); }
    to   { transform: scaleY(1); }
  }

  .paused .bar { animation-play-state: paused; }

  .track-info-small { min-width: 0; }

  .track-name {
    font-size: 0.82rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color .2s;
  }

  .track-artist-small {
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .track-dur {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* ── MAIN ── */
  .main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    gap: 32px;
    position: relative;
    overflow: hidden;
  }

  /* ambient glow behind art */
  .glow {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent2) 0%, transparent 70%);
    opacity: 0.12;
    filter: blur(60px);
    pointer-events: none;
    transition: background 1s;
  }

  /* album art */
  .art-wrapper {
    position: relative;
    width: 260px; height: 260px;
  }

  .art {
    width: 100%; height: 100%;
    border-radius: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    transition: transform .3s ease;
  }

  .art.playing { transform: scale(1.03); }

  .art-placeholder {
    font-size: 5rem;
    user-select: none;
    transition: opacity .3s;
  }

  .art img { width: 100%; height: 100%; object-fit: cover; }

  /* spinning vinyl ring */
  .vinyl {
    position: absolute;
    right: -28px; top: 50%;
    transform: translateY(-50%) rotate(0deg);
    width: 100px; height: 100px;
    border-radius: 50%;
    background: conic-gradient(#1a1a1a 0deg, #2a2a2a 60deg, #1a1a1a 120deg, #2d2d2d 180deg, #1a1a1a 240deg, #252525 300deg, #1a1a1a 360deg);
    box-shadow: 0 0 0 8px #111, 0 0 0 9px #2a2a2a, 0 10px 30px rgba(0,0,0,0.5);
    animation: spin 4s linear infinite;
    animation-play-state: paused;
    z-index: -1;
  }

  .vinyl::after {
    content: '';
    position: absolute; inset: 50%;
    transform: translate(-50%,-50%);
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .vinyl.spinning { animation-play-state: running; }

  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

  /* track meta */
  .now-playing {
    text-align: center;
    max-width: 320px;
  }

  .now-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .now-title {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .now-artist {
    font-size: 0.9rem;
    color: var(--muted);
  }

  /* progress */
  .progress-area {
    width: 100%;
    max-width: 380px;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-track {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 4px;
    width: 0%;
    transition: width .1s linear;
    pointer-events: none;
  }

  .progress-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    left: 0%;
    opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
  }

  .progress-track:hover .progress-thumb { opacity: 1; }

  /* controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 8px;
    border-radius: 50%;
    transition: color .15s, transform .1s;
    display: flex; align-items: center; justify-content: center;
  }

  .ctrl-btn:hover { color: var(--text); transform: scale(1.1); }
  .ctrl-btn.active { color: var(--accent); }

  .play-btn {
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    font-size: 1.4rem;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 0 24px rgba(200,242,80,0.35);
  }

  .play-btn:hover { transform: scale(1.07); box-shadow: 0 0 32px rgba(200,242,80,0.5); }
  .play-btn:active { transform: scale(0.96); }

  /* volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 380px;
    width: 100%;
  }

  .vol-icon { font-size: 1rem; color: var(--muted); }

  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
  }

  /* empty state */
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 40px;
  }

  .empty h2 { font-size: 1.2rem; margin-bottom: 10px; }
  .empty p  { font-size: 0.85rem; line-height: 1.6; }
  .empty code {
    font-family: 'DM Mono', monospace;
    background: var(--card);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.78rem;
    color: var(--accent);
  }

  /* responsive */
  @media (max-width: 700px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { max-height: 40vh; }
    .main { padding: 24px 16px; }
    .art-wrapper { width: 180px; height: 180px; }
    .vinyl { display: none; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo"><span class="logo-dot"></span> PLAYER</div>
      <div class="track-count" id="track-count">0 tracks</div>
    </div>
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search tracks…" oninput="filterTracks(this.value)"/>
    </div>
    <div class="track-list" id="track-list"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="glow"></div>

    <div class="art-wrapper">
      <div class="art" id="art">
        <span class="art-placeholder" id="art-placeholder">🎵</span>
      </div>
      <div class="vinyl" id="vinyl"></div>
    </div>

    <div class="now-playing">
      <div class="now-label">NOW PLAYING</div>
      <div class="now-title" id="now-title">Select a track</div>
      <div class="now-artist" id="now-artist">—</div>
    </div>

    <div class="progress-area">
      <div class="time-row">
        <span id="cur-time">0:00</span>
        <span id="dur-time">0:00</span>
      </div>
      <div class="progress-track" id="progress-track" onclick="seek(event)">
        <div class="progress-fill" id="progress-fill"></div>
        <div class="progress-thumb" id="progress-thumb"></div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="btn-shuffle" title="Shuffle" onclick="toggleShuffle()">⇄</button>
      <button class="ctrl-btn" title="Previous" onclick="prevTrack()">⏮</button>
      <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" title="Next" onclick="nextTrack()">⏭</button>
      <button class="ctrl-btn" id="btn-repeat" title="Repeat" onclick="toggleRepeat()">↻</button>
    </div>

    <div class="volume-row">
      <span class="vol-icon">🔈</span>
      <input type="range" id="volume" min="0" max="1" step="0.02" value="0.8" oninput="setVolume(this.value)"/>
      <span class="vol-icon">🔊</span>
    </div>
  </main>
</div>

<audio id="audio"></audio>

<script>
// ═══════════════════════════════════════════════════════════════════
//  ★  CONFIGURE YOUR TRACKS HERE  ★
//  Each entry: { file: "filename.mp3", title: "Song Title", artist: "Artist Name" }
//  Put your MP3 files in the same folder as this HTML file.
//  Title and artist are optional — the filename will be used if omitted.
// ═══════════════════════════════════════════════════════════════════
const TRACKS = [
  // { file: "song1.mp3", title: "My Song",    artist: "Artist" },
  // { file: "song2.mp3", title: "Another One", artist: "DJ Khaled" },
  // Add more tracks here…
];
// ═══════════════════════════════════════════════════════════════════

// ── state ──
let current    = -1;
let isPlaying  = false;
let shuffle    = false;
let repeat     = false;
let shuffleOrder = [];
let filtered   = [];

const audio      = document.getElementById('audio');
const playBtn    = document.getElementById('play-btn');
const nowTitle   = document.getElementById('now-title');
const nowArtist  = document.getElementById('now-artist');
const progFill   = document.getElementById('progress-fill');
const progThumb  = document.getElementById('progress-thumb');
const progTrack  = document.getElementById('progress-track');
const curTime    = document.getElementById('cur-time');
const durTime    = document.getElementById('dur-time');
const vinyl      = document.getElementById('vinyl');
const art        = document.getElementById('art');
const artHolder  = document.getElementById('art-placeholder');
const trackList  = document.getElementById('track-list');
const trackCount = document.getElementById('track-count');

// ── init ──
function init() {
  filtered = [...TRACKS];
  rebuildList();
  trackCount.textContent = TRACKS.length + ' track' + (TRACKS.length !== 1 ? 's' : '');
  if (TRACKS.length === 0) showEmpty();
}

function showEmpty() {
  trackList.innerHTML = `
    <div class="empty">
      <h2>No tracks yet</h2>
      <p>Add your MP3 files to the same folder as this HTML file,<br/>
      then list them in the <code>TRACKS</code> array at the top of the script.</p>
    </div>`;
}

// ── build sidebar list ──
function rebuildList() {
  if (filtered.length === 0 && TRACKS.length > 0) {
    trackList.innerHTML = `<div class="empty"><p>No results</p></div>`;
    return;
  }
  trackList.innerHTML = filtered.map((t, i) => {
    const idx = TRACKS.indexOf(t);
    const name = t.title || stripExt(t.file);
    const artist = t.artist || 'Unknown artist';
    const isActive = idx === current;
    return `
      <div class="track-item ${isActive ? 'active' : ''}" id="ti-${idx}" onclick="loadTrack(${idx}, true)">
        <span class="track-num">${i + 1}</span>
        <span class="playing-bars ${isPlaying && isActive ? '' : 'paused'}">
          <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </span>
        <div class="track-info-small">
          <div class="track-name">${esc(name)}</div>
          <div class="track-artist-small">${esc(artist)}</div>
        </div>
        <span class="track-dur" id="dur-${idx}">—</span>
      </div>`;
  }).join('');
}

// ── load track ──
function loadTrack(idx, autoplay = false) {
  if (idx < 0 || idx >= TRACKS.length) return;
  current = idx;
  const t = TRACKS[idx];
  audio.src = t.file;
  audio.load();

  const name   = t.title  || stripExt(t.file);
  const artist = t.artist || 'Unknown artist';
  nowTitle.textContent  = name;
  nowArtist.textContent = artist;
  document.title        = name + ' — PLAYER';

  rebuildList();
  scrollToActive();

  if (autoplay) {
    audio.play().then(() => setPlaying(true)).catch(()=>{});
  } else {
    setPlaying(false);
  }
}

// ── play / pause ──
function togglePlay() {
  if (current === -1) {
    if (TRACKS.length > 0) loadTrack(0, true);
    return;
  }
  if (isPlaying) {
    audio.pause();
    setPlaying(false);
  } else {
    audio.play().then(() => setPlaying(true)).catch(()=>{});
  }
}

function setPlaying(state) {
  isPlaying = state;
  playBtn.textContent = state ? '⏸' : '▶';
  vinyl.classList.toggle('spinning', state);
  art.classList.toggle('playing', state);
  // update animated bars
  document.querySelectorAll('.playing-bars').forEach(el => el.classList.toggle('paused', !state));
}

// ── prev / next ──
function nextTrack() {
  if (TRACKS.length === 0) return;
  if (shuffle) {
    loadTrack(randomOtherIndex(), true);
  } else {
    loadTrack((current + 1) % TRACKS.length, true);
  }
}

function prevTrack() {
  if (TRACKS.length === 0) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  if (shuffle) {
    loadTrack(randomOtherIndex(), true);
  } else {
    loadTrack((current - 1 + TRACKS.length) % TRACKS.length, true);
  }
}

function randomOtherIndex() {
  if (TRACKS.length === 1) return 0;
  let r;
  do { r = Math.floor(Math.random() * TRACKS.length); } while (r === current);
  return r;
}

// ── shuffle / repeat ──
function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById('btn-shuffle').classList.toggle('active', shuffle);
}

function toggleRepeat() {
  repeat = !repeat;
  document.getElementById('btn-repeat').classList.toggle('active', repeat);
}

// ── audio events ──
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progFill.style.width  = pct + '%';
  progThumb.style.left  = pct + '%';
  curTime.textContent   = fmt(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  durTime.textContent = fmt(audio.duration);
  const el = document.getElementById('dur-' + current);
  if (el) el.textContent = fmt(audio.duration);
});

audio.addEventListener('ended', () => {
  if (repeat) {
    audio.currentTime = 0;
    audio.play();
  } else {
    nextTrack();
  }
});

// ── seek ──
function seek(e) {
  if (!audio.duration) return;
  const rect = progTrack.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.currentTime = pct * audio.duration;
}

// ── volume ──
function setVolume(v) { audio.volume = v; }
audio.volume = 0.8;

// ── search / filter ──
function filterTracks(q) {
  const lq = q.toLowerCase();
  filtered = TRACKS.filter(t =>
    (t.title  || stripExt(t.file)).toLowerCase().includes(lq) ||
    (t.artist || '').toLowerCase().includes(lq)
  );
  rebuildList();
}

// ── helpers ──
function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function stripExt(f) { return f.replace(/\.[^/.]+$/, '').replace(/[-_]/g, ' '); }
function esc(s)      { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function scrollToActive() {
  const el = document.getElementById('ti-' + current);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') nextTrack();
  if (e.code === 'ArrowLeft')  prevTrack();
});

init();
</script>
</body>
</html>
